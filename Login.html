<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="Login.css" />
    <link rel="icon" href="img/favicon.png" type="image/x-icon" />
    <title>Leva e Traz - Login</title>
  </head>
  <body>
    <div class="login-container">
      <div class="login">
        <img src="img/logo.png" alt="Logo Leva e Traz" />
        <h1>Bem-vindo de volta</h1>
        <p>Entre na sua conta para continuar</p>
        <form action="dashboard.html">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Digite seu email"
              required
            />
          </div>
          <div class="form-group">
            <label for="senha">Senha</label>
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Digite sua senha"
              required
            />
          </div>
          <a href="recuperar-senha.html" class="link-recuperar"
            >Esqueci minha senha</a
          >
          <button type="submit" id="botao-login">Entrar na conta</button>
        </form>
        <div class="divisor">
          <span>ou</span>
        </div>

        <a href="dashboard.html" class="google-button">
          <img src="img/googleimg.png" alt="Google" />
          <span>Continuar com Google</span>
        </a>

        <p>Não tem conta? <a href="cadastro.html">Criar conta grátis</a></p>
      </div>
    </div>
  </body>
</html>
