<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="cadastro.css" />
    <link rel="icon" href="img/favicon.png" type="image/x-icon" />
    <title>Leva e Traz - Cadastro</title>
  </head>
  <body>
    <div class="login-container">
      <div class="cadastro">
        <img src="img/logo.png" alt="logo" />
        <h1>Faça seu Cadastro</h1>
        <form action="dashboard.html">
          <div class="linha">
            <div class="form-group">
              <label for="Nome">Nome</label>
              <input
                type="text"
                id="Nome"
                name="Nome"
                placeholder="João"
                required
              />
            </div>

            <div class="form-group">
              <label for="Sobrenome">Sobrenome</label>
              <input
                type="text"
                id="Sobrenome"
                name="Sobrenome"
                placeholder="Silva"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label for="CPF">CPF</label>
            <input
              type="CPF"
              id="CPF"
              name="CPF"
              placeholder="000.000.000-00"
              required
            />
          </div>

          <div class="form-group">
            <label for="telefone">Telefone</label>
            <input
              type="tel"
              id="telefone"
              name="telefone"
              placeholder="(44) 99999-0000"
              required
            />
          </div>

          <div class="linha2">
            <div class="form-group">
              <label class="lbl">Nascimento</label> <input type="date" />
            </div>
            <div class="form-group">
              <label for="cidade">Cidade</label>
              <input
                type="Cidade"
                id="Cidade"
                name="Cidade"
                placeholder="Maringá, PR"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label for="senha">Senha</label>
            <input
              type="password"
              id="senha"
              name="senha"
              placeholder="Minímo 8 caracteres"
              required
            />
          </div>

          <div class="form-group">
            <label for="Confirmar">Confimar Senha</label>
            <input
              type="password"
              id="Confirmar"
              name="Confirmar"
              placeholder="Repita a senha"
              required
            />
          </div>

          <div class="checkbox">
            <label>
              <input type="checkbox" name="termos" value="aceito" />
              Concordo com os Termos de Uso e Política de Privacidade
            </label>
          </div>

          <button type="submit" id="botao-conta">Criar minhas conta grátis</button>
        </form>

        <form action="dashboard.html">
          <div class="divisor">
            <span>ou</span>
          </div>
          <div class="botao-google">
            <button type="submit">
              <img src="img/googleimg.png" alt="Google" />
              Continuar com Google
            </button>
          </div>

          <div class="conta">
            <p>Já tem conta? <a href="Login.html">Fazer login</a></p>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
